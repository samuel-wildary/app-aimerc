services:
  backend:
    build:
      context: ./backend
    environment:
      NODE_ENV: production
      PORT: 3000
      AIMERC_TOKEN_SECRET: ${AIMERC_TOKEN_SECRET}
      AIMERC_TOKEN_SECRET_PREVIOUS: ${AIMERC_TOKEN_SECRET_PREVIOUS:-}
      AIMERC_ALLOWED_ORIGINS: ${AIMERC_ALLOWED_ORIGINS}
      AIMERC_PUBLIC_API_URL: ${AIMERC_PUBLIC_API_URL:-}
      AIMERC_TRUST_PROXY_HOPS: ${AIMERC_TRUST_PROXY_HOPS:-1}
      AIMERC_DB_POOL_MAX: ${AIMERC_DB_POOL_MAX:-10}
      AIMERC_ADMIN_NAME: ${AIMERC_ADMIN_NAME:-Administrador AiMerc}
      AIMERC_ADMIN_EMAIL: ${AIMERC_ADMIN_EMAIL:-}
      AIMERC_ADMIN_PASSWORD: ${AIMERC_ADMIN_PASSWORD:-}
      DATABASE_URL: ${DATABASE_URL}
      FIREBASE_SERVICE_ACCOUNT_BASE64: ${FIREBASE_SERVICE_ACCOUNT_BASE64:-}
    ports:
      - "3000:3000"
    volumes:
      - aimerc_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 5

  dashboard:
    build:
      context: ./supermarket-dashboard
      args:
        VITE_API_URL: ${PUBLIC_API_URL:-https://wildhub-aimerc-backend-app.5mos1l.easypanel.host/api}
    ports:
      - "4201:80"
    depends_on:
      - backend
    restart: unless-stopped

  saas-admin:
    build:
      context: ./saas-admin
      args:
        VITE_API_URL: ${PUBLIC_API_URL:-https://wildhub-aimerc-backend-app.5mos1l.easypanel.host/api}
    ports:
      - "4202:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  aimerc_data:
