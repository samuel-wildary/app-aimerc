services:
  backend:
    build:
      context: ./backend
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL}
      AIMERC_TOKEN_SECRET: ${AIMERC_TOKEN_SECRET}
      AIMERC_ALLOWED_ORIGINS: ${AIMERC_ALLOWED_ORIGINS}
      FIREBASE_SERVICE_ACCOUNT_BASE64: ${FIREBASE_SERVICE_ACCOUNT_BASE64:-}
    ports:
      - "3000:3000"
    volumes:
      - aimerc_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 5

  dashboard:
    build:
      context: ./supermarket-dashboard
      args:
        VITE_API_URL: ${PUBLIC_API_URL:-https://wildhub-aimerc-backend-app.5mos1l.easypanel.host/api}
    ports:
      - "4201:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  saas-admin:
    build:
      context: ./saas-admin
      args:
        VITE_API_URL: ${PUBLIC_API_URL:-https://wildhub-aimerc-backend-app.5mos1l.easypanel.host/api}
    ports:
      - "4202:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  aimerc_data:
